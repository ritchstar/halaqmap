# يعمل تلقائياً عند كل دفع أو طلب دمج إلى الفرع الرئيسي.
# الهدف: أن يبقى ما على GitHub دائماً يمرّ بفحص lint وبناء ناجح.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Production build
        run: npm run build
        env:
          VITE_ENABLE_ROUTE_MESSAGING: "true"
