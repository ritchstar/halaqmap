name: Security on Push/PR

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  security-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (json)
        run: npm audit --json > npm-audit.json || true

      - name: Triage vulnerabilities and fail on critical
        env:
          SECURITY_TRIAGE_REPORT: security-on-push-report.md
          FAIL_ON_CRITICAL: "true"
          SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_TRIAGE_SLACK_WEBHOOK }}
        run: node scripts/security-triage.mjs npm-audit.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-on-push
          path: |
            npm-audit.json
            security-on-push-report.md
