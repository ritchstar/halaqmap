    <!-- تنظيف URL من معاملات _b= المتراكمة + كاش SW لمرة واحدة -->
    <script>
      (function () {
        try {
          var u = new URL(window.location.href);
          while (u.searchParams.has('_b')) u.searchParams.delete('_b');
          var clean = u.pathname + u.search + u.hash;
          if (clean !== window.location.pathname + window.location.search + window.location.hash) {
            window.history.replaceState(null, '', clean);
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var flag = 'hm-sw-reset-v7';
          if (localStorage.getItem(flag)) return;
          localStorage.setItem(flag, '1');
          localStorage.removeItem('hm-sw-reset-v6');
          localStorage.removeItem('hm-sw-reset-v5');
          localStorage.removeItem('hm-sw-reset-v3');
          localStorage.removeItem('hm-sw-reset-v2');
          sessionStorage.removeItem('hm-chunk-recover');
          sessionStorage.removeItem('hm-build-sync-auto-reloaded');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            });
          }
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          }
        } catch (e) {}
      })();
    </script>
    <!-- خط دفاع أخير ضد الشاشة البيضاء: إذا لم يتم mount للتطبيق خلال المهلة، ننفّذ إنعاش إنقاذي مرة واحدة -->
    <script>
      (function () {
        try {
          var mountedFlag = '__halaqmapAppMountedV1';
          var overlayId = 'hm-boot-emergency-overlay-v1';
          var key =
            'hm-boot-watchdog-v1:' +
            window.location.pathname +
            window.location.search +
            window.location.hash;

          if (window[mountedFlag] !== true) {
            window[mountedFlag] = false;
          }

          var removeOverlay = function () {
            var existing = document.getElementById(overlayId);
            if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
          };

          var showOverlay = function () {
            if (document.getElementById(overlayId)) return;
            var el = document.createElement('div');
            el.id = overlayId;
            el.setAttribute('dir', 'rtl');
            el.style.cssText =
              'position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#0f172a;font-family:Tajawal,system-ui,sans-serif;padding:24px;';
            el.innerHTML =
              '<div style="max-width:640px;background:#ffffff;border:1px solid #cbd5e1;border-radius:16px;padding:18px 16px;box-shadow:0 24px 48px -32px rgba(15,23,42,.35)">' +
              '<h2 style="margin:0 0 8px;font-size:20px;font-weight:800;color:#0f172a">نقوم باستعادة الصفحة تلقائياً…</h2>' +
              '<p style="margin:0 0 12px;font-size:14px;line-height:1.8;color:#334155">تم رصد تعثّر في الإقلاع. يجري الآن تنظيف الكاش وإعادة التحميل الآمن.</p>' +
              '<button id="hm-boot-emergency-btn" style="border:0;border-radius:10px;padding:10px 14px;background:#0ea5e9;color:#fff;font-weight:700;cursor:pointer">إعادة تحميل فورية</button>' +
              '</div>';
            document.body.appendChild(el);
            var btn = document.getElementById('hm-boot-emergency-btn');
            if (btn) {
              btn.addEventListener('click', function () {
                try {
                  sessionStorage.removeItem(key);
                } catch (e) {}
                window.location.reload();
              });
            }
          };

          window.addEventListener('halaqmap:mounted', function () {
            window[mountedFlag] = true;
            removeOverlay();
          });

          window.setTimeout(function () {
            try {
              if (window[mountedFlag] === true) return;
              if (sessionStorage.getItem(key) === '1') return;
              sessionStorage.setItem(key, '1');
              showOverlay();

              var reload = function () {
                try {
                  var u = new URL(window.location.href);
                  u.searchParams.set('_boot', String(Date.now()));
                  window.location.replace(u.pathname + u.search + u.hash);
                } catch (e) {
                  window.location.reload();
                }
              };

              var clearCaches = function () {
                if (!('caches' in window)) return Promise.resolve();
                return caches
                  .keys()
                  .then(function (keys) {
                    return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                  })
                  .catch(function () {});
              };

              if ('serviceWorker' in navigator) {
                navigator.serviceWorker
                  .getRegistrations()
                  .then(function (regs) {
                    return Promise.all(regs.map(function (r) { return r.unregister(); }));
                  })
                  .catch(function () {})
                  .then(clearCaches)
                  .finally(reload);
              } else {
                clearCaches().finally(reload);
              }
            } catch (e) {
              showOverlay();
              window.location.reload();
            }
          }, 7000);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var isMobile = window.matchMedia && window.matchMedia('(max-width: 767px)').matches;
          var saveData = navigator.connection && navigator.connection.saveData === true;
          if (isMobile || saveData) return;
          var loaded = false;
          var loadTajawal = function () {
            if (loaded) return;
            loaded = true;
            var preconnectApi = document.createElement('link');
            preconnectApi.rel = 'preconnect';
            preconnectApi.href = 'https://fonts.googleapis.com';
            document.head.appendChild(preconnectApi);

            var preconnectStatic = document.createElement('link');
            preconnectStatic.rel = 'preconnect';
            preconnectStatic.href = 'https://fonts.gstatic.com';
            preconnectStatic.crossOrigin = 'anonymous';
            document.head.appendChild(preconnectStatic);

            var stylesheet = document.createElement('link');
            stylesheet.rel = 'stylesheet';
            stylesheet.href = 'https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap';
            stylesheet.setAttribute('data-hm-font', 'tajawal');
            document.head.appendChild(stylesheet);
          };

          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadTajawal, { timeout: 2500 });
          } else {
            window.setTimeout(loadTajawal, 1200);
          }
        } catch (e) {}
      })();
    </script>

  <body>
    <!-- HashRouter: الروابط الصحيحة للتقييم هي /#/rate/…?t=… — إن فُتحت /rate/… بدون # نُعيد التوجيه قبل تحميل React -->
    <script>
      (function () {
        try {
          var path = window.location.pathname || '';
          var hash = window.location.hash || '';
          if (path.indexOf('/rate/') === 0 && hash.length <= 1) {
            window.location.replace(window.location.origin + '/#' + path + (window.location.search || ''));
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <!-- استرداد تلقائي إذا فشل تحميل حزمة JS بعد نشر جديد (كاش SW/ CDN قديم) -->
    <script>
      (function () {
        var key = 'hm-chunk-recover';
        if (sessionStorage.getItem(key)) return;
        window.addEventListener(
          'error',
          function (ev) {
            var t = ev.target;
            if (!t || t.tagName !== 'SCRIPT') return;
            var src = t.src || '';
            if (src.indexOf('/assets/') === -1) return;
            sessionStorage.setItem(key, '1');
            var reload = function () {
              window.location.reload();
            };
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  return Promise.all(regs.map(function (r) {
                    return r.unregister();
                  }));
                })
                .catch(function () {})
                .finally(reload);
            } else {
              reload();
            }
          },
          true,
        );
      })();
    </script>
    <!-- ?v= يقلّل احتمال كاش قديم أثناء التطوير؛ الإنتاج يُضاف لها query على /assets/* عبر vite.config.ts -->
    <script type="module" src="/src/main.tsx?v=2"></script>
  </body>
