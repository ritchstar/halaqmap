<!DOCTYPE html>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="حلاق ماب" />
    <!-- شريط عنوان المتصفح / PWA — فاتح وداكن (مسار الخدمات البرمجية للمنصة يضبط لوناً أغمق عند التحميل من React) -->
    <meta name="theme-color" content="#0d9488" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#061223" media="(prefers-color-scheme: dark)" />
    <meta name="format-detection" content="telephone=no" />
    <style>
      html,
      body {
        margin: 0;
        background: #020912;
        color: #e2e8f0;
      }
    </style>
    <!-- تنظيف URL من معاملات _b= المتراكمة + كاش SW لمرة واحدة -->
    <script>
      (function () {
        try {
          var u = new URL(window.location.href);
          while (u.searchParams.has('_b')) u.searchParams.delete('_b');
          var clean = u.pathname + u.search + u.hash;
          if (clean !== window.location.pathname + window.location.search + window.location.hash) {
            window.history.replaceState(null, '', clean);
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var flag = 'hm-sw-reset-v5';
          if (localStorage.getItem(flag)) return;
          localStorage.setItem(flag, '1');
          localStorage.removeItem('hm-sw-reset-v4');
          localStorage.removeItem('hm-sw-reset-v3');
          localStorage.removeItem('hm-sw-reset-v2');
          sessionStorage.removeItem('hm-chunk-recover');
          sessionStorage.removeItem('hm-build-sync-auto-reloaded');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            });
          }
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"

      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      />
    </noscript>
    <title>حلاق ماب | HALAQ MAP</title>
    <meta

      content="حلاق ماب: المنصة الأولى المدعومة بنظام الرصد الذكي. محرك بحث جغرافي فائق السرعة يرصد ويحدد أقرب صالونات الحلاقة بدقة متناهية."
    />
    <meta name="author" content="حلاق ماب" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- أيقونة الموقع: Google يفضّل SVG/ICO صالحة ومتعددة الروابط -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="alternate icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/favicon.svg" color="#0d9488" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/icons/icon-152.png" sizes="152x152" />
    <link rel="canonical" href="https://www.halaqmap.com/" />

    <!-- Open Graph (فيسبوك، واتساب، لينكدإن، …) — og:image يجب أن يكون رابط ملف صورة (PNG/JPG) وليس الصفحة الرئيسية -->
    <meta property="og:title" content="حلاق ماب | نظام الرصد الذكي" />
    <meta
      property="og:description"
      content="محرك بحث جغرافي فائق السرعة، يرصد ويحدد أقرب صالونات الحلاقة إليك بدقة متناهية وفي أجزاء من الثانية."
    />

      content="https://www.halaqmap.com/images/halaqmap_logo_20260409_073322.png"
    />
    <meta property="og:image:alt" content="شعار حلاق ماب" />
    <meta property="og:site_name" content="حلاق ماب" />

    <!-- X (تويتر) -->

  <body>
    <!-- HashRouter: الروابط الصحيحة للتقييم هي /#/rate/…?t=… — إن فُتحت /rate/… بدون # نُعيد التوجيه قبل تحميل React -->
    <script>
      (function () {
        try {
          var path = window.location.pathname || '';
          var hash = window.location.hash || '';
          if (path.indexOf('/rate/') === 0 && hash.length <= 1) {
            window.location.replace(window.location.origin + '/#' + path + (window.location.search || ''));
          }
        } catch (e) {}
      })();
    </script>
    <!-- قشرة LCP — خارج #root؛ pointer-events:none حتى لا تحجب التفاعل -->
    <div
      id="hm-initial-paint"
      dir="rtl"
      aria-hidden="true"
      style="
        position: fixed;
        inset: 0;
        z-index: 100;
        overflow: auto;
        min-height: 100dvh;
        margin: 0;
        padding: 6.5rem 1.25rem 2rem;
        box-sizing: border-box;
        background: #020912;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        pointer-events: none;
      "
    >
      <main style="max-width: 72rem; margin: 0 auto">
        <p style="margin: 0 0 1rem; font-size: 0.75rem; font-weight: 600; color: #5eead4">
          نظام الاستجابة الذكية · حلاق ماب
        </p>
        <h1
          style="
            margin: 0 0 1rem;
            font-size: clamp(2.25rem, 8vw, 3.25rem);
            font-weight: 800;
            line-height: 1.12;
            color: #ffffff;
          "
        >
          حلاقك المثالي
          <span style="display: block; color: #5eead4">في محيطك الآن</span>
        </h1>
        <p style="margin: 0; max-width: 32rem; font-size: 0.95rem; line-height: 1.65; color: #94a3b8">
          رادار جغرافي ذكي يكشف أقرب الصالونات المتاحة فور بحثك.
        </p>
      </main>
    </div>
    <div
      id="root"
      style="position: relative; z-index: 101; min-height: 100dvh; isolation: isolate; background: #020912"
    ></div>
    <!-- إخفاء القشرة فقط بعد رسم h1 الحقيقي — لا عند أول عقدة React -->
    <script>
      (function () {
        var root = document.getElementById('root');
        var shell = document.getElementById('hm-initial-paint');
        if (!root || !shell) return;

        function hideShell() {
          if (shell.dataset.dismissing === '1') return;
          shell.dataset.dismissing = '1';
          shell.style.pointerEvents = 'none';
          shell.style.transition = 'opacity 120ms ease';
          shell.style.opacity = '0';
          window.setTimeout(function () {
            shell.remove();
          }, 130);
        }

        var obs = new MutationObserver(function () {
          if (root.querySelector('h1')) {
            hideShell();
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true, subtree: true });
        window.setTimeout(hideShell, 8000);
      })();
    </script>
    <!-- شبكة أمان إضافية إذا تعطّل JS بالكامل -->
    <script>
      (function () {
        window.setTimeout(function () {
          var shell = document.getElementById('hm-initial-paint');
          if (!shell || shell.dataset.dismissing === '1') return;
          shell.dataset.dismissing = '1';
          shell.style.transition = 'opacity 120ms ease';
          shell.style.opacity = '0';
          shell.style.pointerEvents = 'none';
          window.setTimeout(function () {
            shell.remove();
          }, 130);
        }, 6000);
      })();
    </script>
    <!-- استرداد تلقائي إذا فشل تحميل حزمة JS بعد نشر جديد (كاش SW/ CDN قديم) -->
    <script>
      (function () {
        var key = 'hm-chunk-recover';
        if (sessionStorage.getItem(key)) return;
        window.addEventListener(
          'error',
          function (ev) {
            var t = ev.target;
            if (!t || t.tagName !== 'SCRIPT') return;
            var src = t.src || '';
            if (src.indexOf('/assets/') === -1) return;
            sessionStorage.setItem(key, '1');
            var reload = function () {
              window.location.reload();
            };
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  return Promise.all(regs.map(function (r) {
                    return r.unregister();
                  }));
                })
                .catch(function () {})
                .finally(reload);
            } else {
              reload();
            }
          },
          true,
        );
      })();
    </script>
    <!-- ?v= يقلّل احتمال كاش قديم أثناء التطوير؛ الإنتاج يُضاف لها query على /assets/* عبر vite.config.ts -->
    <script type="module" src="/src/main.tsx?v=2"></script>
  </body>
</html>
